<!-- 서귀포 — 정방폭포 (고퀄 리터치) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" preserveAspectRatio="xMidYMax slice">
  <defs>
    <filter id="sk"><feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="5"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="mist"><feGaussianBlur stdDeviation="4"/></filter>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe0f2"/><stop offset="0.6" stop-color="#dcecf6"/><stop offset="1" stop-color="#eaf4f2"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b6d49a"/><stop offset="1" stop-color="#8fb573"/>
    </linearGradient>
    <!-- 절벽 암벽 (햇빛 받는 오른쪽 밝게) -->
    <linearGradient id="cliffL" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0" stop-color="#6f6c78"/><stop offset="1" stop-color="#8a8794"/>
    </linearGradient>
    <linearGradient id="cliffR" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0" stop-color="#8a8794"/><stop offset="1" stop-color="#9d9aa6"/>
    </linearGradient>
    <!-- 폭포 물장막 -->
    <linearGradient id="fall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef8ff"/><stop offset="0.5" stop-color="#dff1fb"/><stop offset="1" stop-color="#f4fbff"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ecfe0"/><stop offset="1" stop-color="#5aacca"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3cf"/><stop offset="0.7" stop-color="#ffe08c"/><stop offset="1" stop-color="#ffd36a"/>
    </radialGradient>
    <radialGradient id="mistPool" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <g id="cloud">
      <path d="M10,36 C1,36 -5,27 2,21 C-1,10 12,4 20,11 C25,-1 44,-2 50,9 C61,3 75,10 71,22 C82,23 82,36 71,36 Z" fill="#ffffff"/>
      <path d="M10,36 C1,36 -5,27 2,21 C-1,10 12,4 20,11 C25,-1 44,-2 50,9 C61,3 75,10 71,22 C82,23 82,36 71,36 Z" fill="none" stroke="#40514a" stroke-width="2"/>
      <path d="M14,31 C24,35 40,35 52,31" fill="none" stroke="#bcd6ea" stroke-width="1.6" opacity="0.7"/>
    </g>
    <g id="pine">
      <line x1="0" y1="4" x2="0" y2="-16" stroke="#6b4a28" stroke-width="5"/>
      <path d="M-22,-12 L0,-42 L22,-12 Z" fill="#4e7d3a" stroke="#33582a" stroke-width="1.8"/>
      <path d="M-17,-30 L0,-56 L17,-30 Z" fill="#5f8f3f" stroke="#33582a" stroke-width="1.8"/>
      <path d="M-11,-46 L0,-66 L11,-46 Z" fill="#6f9f48" stroke="#33582a" stroke-width="1.6"/>
    </g>
  </defs>

  <rect width="1440" height="760" fill="url(#sky)"/>
  <g filter="url(#sk)" stroke-linecap="round" stroke-linejoin="round">

    <!-- 해 · 구름 · 새 -->
    <circle cx="1220" cy="106" r="74" fill="#fff2c8" opacity="0.5" filter="url(#soft)"/>
    <circle cx="1220" cy="106" r="46" fill="url(#sun)" stroke="#f2c25a" stroke-width="2"/>
    <use href="#cloud" transform="translate(940,74) scale(0.98)"/>
    <use href="#cloud" transform="translate(1110,168) scale(0.7)" opacity="0.95"/>
    <use href="#cloud" transform="translate(1020,40) scale(0.6)" opacity="0.9"/>
    <path d="M1000,220 q12,-12 24,0 q12,-12 24,0" fill="none" stroke="#40514a" stroke-width="2.2"/>
    <path d="M1090,250 q9,-9 18,0 q9,-9 18,0" fill="none" stroke="#40514a" stroke-width="2.2"/>

    <!-- 절벽 위 숲 언덕 -->
    <path d="M-20,150 C160,120 400,116 560,140 C660,154 760,166 900,160 L900,300 L-20,300 Z" fill="url(#hill)" stroke="#40514a" stroke-width="2.4"/>
    <path d="M-20,196 C180,172 420,172 620,192" fill="none" stroke="#7f9a6a" stroke-width="1.6" opacity="0.5"/>
    <!-- 뒷줄(작게) + 앞줄 소나무 -->
    <use href="#pine" transform="translate(140,150) scale(0.75)" opacity="0.85"/>
    <use href="#pine" transform="translate(300,146) scale(0.75)" opacity="0.85"/>
    <use href="#pine" transform="translate(620,158) scale(0.72)" opacity="0.85"/>
    <use href="#pine" transform="translate(80,152)"/>
    <use href="#pine" transform="translate(210,140) scale(1.15)"/>
    <use href="#pine" transform="translate(360,134) scale(0.92)"/>
    <use href="#pine" transform="translate(500,148) scale(1.2)"/>
    <use href="#pine" transform="translate(670,158) scale(0.96)"/>
    <use href="#pine" transform="translate(810,162) scale(1.1)"/>

    <!-- 절벽 암벽 (좌/우 명암) -->
    <path d="M-20,290 L900,286 L900,300 C880,380 870,470 874,560 L560,560 C556,470 550,380 540,300 L-20,306 Z" fill="url(#cliffR)" stroke="#26242b" stroke-width="2.4"/>
    <path d="M-20,290 L540,300 C550,380 556,470 560,560 L-20,560 Z" fill="url(#cliffL)" stroke="#26242b" stroke-width="2.4"/>
    <!-- 세로 절리 결 -->
    <path d="M120,306 C124,390 126,478 126,556 M260,304 C266,388 268,478 268,558 M400,302 C406,388 410,476 410,558 M700,320 C704,400 706,478 706,556 M800,314 C806,398 810,476 810,556" fill="none" stroke="#565360" stroke-width="1.8" opacity="0.7"/>
    <!-- 가로 층리 -->
    <path d="M40,346 L470,352 M60,420 L500,426 M40,500 L520,506 M690,340 L868,336 M710,416 L870,412 M726,492 L872,488" stroke="#565360" stroke-width="1.8" opacity="0.65"/>
    <!-- 기공 -->
    <circle cx="180" cy="380" r="3.4" fill="#1c1b20" opacity="0.55"/><circle cx="340" cy="460" r="3" fill="#1c1b20" opacity="0.55"/>
    <circle cx="120" cy="530" r="3.2" fill="#1c1b20" opacity="0.55"/><circle cx="780" cy="372" r="3.2" fill="#1c1b20" opacity="0.55"/>
    <circle cx="812" cy="452" r="3" fill="#1c1b20" opacity="0.55"/><circle cx="440" cy="410" r="2.6" fill="#1c1b20" opacity="0.5"/>
    <!-- 매달린 덩굴 + 이끼 -->
    <path d="M240,300 q-6,44 4,86 M252,300 q6,40 -2,78" fill="none" stroke="#5f8f3f" stroke-width="2.6"/>
    <path d="M660,296 q-6,48 4,92 M674,296 q6,42 -2,80" fill="none" stroke="#5f8f3f" stroke-width="2.6"/>
    <path d="M60,300 q-3,30 3,58 M470,302 q4,26 -2,52" fill="none" stroke="#6f9f48" stroke-width="2" opacity="0.7"/>
    <ellipse cx="150" cy="316" rx="26" ry="9" fill="#6f9f48" opacity="0.4"/>
    <ellipse cx="760" cy="314" rx="30" ry="9" fill="#6f9f48" opacity="0.4"/>

    <!-- 폭포 물장막 -->
    <rect x="556" y="292" width="322" height="272" fill="url(#fall)"/>
    <!-- 물줄기 (가는 결) -->
    <path d="M580,300 C574,380 576,470 584,556 M628,298 C622,384 624,472 632,556 M676,300 C672,386 674,470 680,558 M724,298 C720,384 722,470 728,556 M772,300 C768,386 770,472 776,558 M820,298 C816,382 818,470 824,556 M856,302 C852,386 854,470 858,556" fill="none" stroke="#bfe2f2" stroke-width="5"/>
    <!-- 굵은 물줄기 (흰 하이라이트) -->
    <path d="M604,300 C600,384 602,470 608,556 M700,300 C696,384 698,470 704,556 M796,300 C792,384 794,470 800,556 M844,300 C840,384 842,470 846,556" fill="none" stroke="#ffffff" stroke-width="7"/>
    <path d="M652,300 C648,384 650,470 656,556 M748,300 C744,384 746,470 752,556" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.85"/>
    <!-- 상단 물 넘어가는 지점 -->
    <path d="M556,292 C620,286 800,286 878,292" fill="none" stroke="#8fc0d4" stroke-width="3"/>
    <path d="M566,300 q40,-8 80,0 q40,-8 80,0 q40,-8 80,0" fill="none" stroke="#eef8ff" stroke-width="3" opacity="0.9"/>

    <!-- 바다 -->
    <rect x="-20" y="556" width="1480" height="204" fill="url(#sea)"/>
    <line x1="-20" y1="556" x2="1460" y2="556" stroke="#5fa8c0" stroke-width="2.5"/>
    <path d="M120,620 q22,-8 44,0 M340,680 q22,-8 44,0 M1000,610 q22,-8 44,0 M1220,660 q24,-9 48,0 M1100,720 q24,-9 48,0 M200,730 q24,-9 48,0" fill="none" stroke="#ffffff" stroke-width="2.6" opacity="0.9"/>

    <!-- 폭포 아래 물안개 (부드러운 뭉게 + 포말 알갱이) -->
    <ellipse cx="716" cy="576" rx="180" ry="42" fill="url(#mistPool)" filter="url(#mist)"/>
    <g fill="#ffffff" stroke="#d8f0f6" stroke-width="1.6">
      <circle cx="600" cy="570" r="19"/><circle cx="648" cy="580" r="23"/><circle cx="704" cy="572" r="20"/>
      <circle cx="760" cy="582" r="23"/><circle cx="816" cy="572" r="19"/><circle cx="862" cy="580" r="16"/>
      <circle cx="570" cy="584" r="13"/><circle cx="890" cy="588" r="12"/>
    </g>
    <circle cx="620" cy="536" r="3.6" fill="#ffffff"/><circle cx="700" cy="524" r="3" fill="#ffffff"/>
    <circle cx="790" cy="534" r="3.4" fill="#ffffff"/><circle cx="850" cy="520" r="2.8" fill="#ffffff"/>
    <circle cx="660" cy="548" r="2.6" fill="#ffffff"/><circle cx="740" cy="516" r="2.6" fill="#ffffff"/>

    <!-- 무지개 -->
    <g fill="none" opacity="0.6">
      <path d="M556,644 A152,152 0 0 1 864,644" stroke="#ff8c8c" stroke-width="8"/>
      <path d="M568,644 A140,140 0 0 1 852,644" stroke="#ffd36a" stroke-width="8"/>
      <path d="M580,644 A128,128 0 0 1 840,644" stroke="#8fd8a0" stroke-width="8"/>
      <path d="M592,644 A116,116 0 0 1 828,644" stroke="#8fc6ea" stroke-width="8"/>
      <path d="M604,644 A104,104 0 0 1 816,644" stroke="#b79ad6" stroke-width="8"/>
    </g>

    <!-- 바위들 (하이라이트·기공) -->
    <path d="M960,760 C955,712 985,686 1030,688 C1078,690 1104,720 1100,760 Z" fill="#565360" stroke="#26242b" stroke-width="2.4"/>
    <path d="M972,714 C990,700 1020,700 1040,712" fill="none" stroke="#8b8794" stroke-width="2" opacity="0.7"/>
    <path d="M1130,760 C1128,730 1150,710 1182,712 C1212,714 1230,738 1228,760 Z" fill="#6f6c77" stroke="#26242b" stroke-width="2.4"/>
    <path d="M1140,730 C1158,718 1180,718 1198,728" fill="none" stroke="#93909c" stroke-width="2" opacity="0.7"/>
    <path d="M420,760 C416,720 444,698 484,700 C526,702 550,728 546,760 Z" fill="#5e5b67" stroke="#26242b" stroke-width="2.4"/>
    <path d="M432,724 C450,712 476,712 494,722" fill="none" stroke="#8b8794" stroke-width="2" opacity="0.7"/>
    <circle cx="1010" cy="714" r="3" fill="#1c1b20" opacity="0.6"/><circle cx="1060" cy="732" r="2.6" fill="#1c1b20" opacity="0.6"/>
    <circle cx="480" cy="728" r="3" fill="#1c1b20" opacity="0.6"/>
    <!-- 바위에 부딪는 포말 -->
    <path d="M930,750 q20,-9 40,0 M1240,748 q20,-9 40,0 M390,748 q20,-9 40,0 M560,742 q20,-9 40,0" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.95"/>
    <circle cx="948" cy="742" r="6" fill="#ffffff"/><circle cx="1218" cy="740" r="6" fill="#ffffff"/><circle cx="408" cy="740" r="6" fill="#ffffff"/>
  </g>
</svg>
