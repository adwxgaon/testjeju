<!-- 한라산 — 백록담과 산 풍경 (고퀄 리터치) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" preserveAspectRatio="xMidYMax slice">
  <defs>
    <filter id="sk"><feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="5"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>

    <!-- 하늘: 위쪽 파랑 → 지평선 근처 옅은 살구빛 -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe0f2"/><stop offset="0.55" stop-color="#dcecf6"/><stop offset="1" stop-color="#f3efe4"/>
    </linearGradient>
    <!-- 한라산 본체 명암 -->
    <linearGradient id="mtn" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#d3ebb4"/><stop offset="0.45" stop-color="#a9d183"/><stop offset="1" stop-color="#7fae5a"/>
    </linearGradient>
    <!-- 좌측(음지) 그림자용 -->
    <linearGradient id="mtnShade" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#9db98a" stop-opacity="0.55"/><stop offset="1" stop-color="#9db98a" stop-opacity="0"/>
    </linearGradient>
    <!-- 먼 능선 (대기 원근) -->
    <linearGradient id="ridgeFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe0d6"/><stop offset="1" stop-color="#bcd3c6"/>
    </linearGradient>
    <linearGradient id="ridgeMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bcd6b2"/><stop offset="1" stop-color="#a7c79c"/>
    </linearGradient>
    <linearGradient id="forestGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bcd9a4"/><stop offset="1" stop-color="#9cc182"/>
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcecc4"/><stop offset="1" stop-color="#c7e0aa"/>
    </linearGradient>
    <radialGradient id="lake" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#cdeef6"/><stop offset="0.6" stop-color="#9fd4e8"/><stop offset="1" stop-color="#79bcd6"/>
    </radialGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3cf"/><stop offset="0.7" stop-color="#ffe08c"/><stop offset="1" stop-color="#ffd36a"/>
    </radialGradient>

    <g id="cloud">
      <path d="M10,36 C1,36 -5,27 2,21 C-1,10 12,4 20,11 C25,-1 44,-2 50,9 C61,3 75,10 71,22 C82,23 82,36 71,36 Z" fill="#ffffff"/>
      <path d="M10,36 C1,36 -5,27 2,21 C-1,10 12,4 20,11 C25,-1 44,-2 50,9 C61,3 75,10 71,22 C82,23 82,36 71,36 Z" fill="none" stroke="#40514a" stroke-width="2"/>
      <path d="M14,31 C24,35 40,35 52,31" fill="none" stroke="#bcd6ea" stroke-width="1.6" opacity="0.7"/>
    </g>
    <!-- 침엽수 (구상나무) -->
    <g id="fir">
      <line x1="0" y1="4" x2="0" y2="-10" stroke="#6b4a28" stroke-width="4"/>
      <path d="M-15,2 L0,-30 L15,2 Z" fill="#4e7d3a" stroke="#33582a" stroke-width="1.6"/>
      <path d="M-12,-10 L0,-40 L12,-10 Z" fill="#5f8f3f" stroke="#33582a" stroke-width="1.6"/>
      <path d="M-8,-22 L0,-48 L8,-22 Z" fill="#6f9f48" stroke="#33582a" stroke-width="1.4"/>
    </g>
    <!-- 둥근 활엽수 -->
    <g id="tree">
      <line x1="0" y1="2" x2="0" y2="-12" stroke="#7d5c36" stroke-width="4"/>
      <circle cx="0" cy="-24" r="16" fill="#5f8f3f" stroke="#33582a" stroke-width="1.8"/>
      <path d="M-10,-30 a11,11 0 0 1 14,-4" fill="none" stroke="#8fc06a" stroke-width="2" opacity="0.7"/>
    </g>
  </defs>

  <rect width="1440" height="760" fill="url(#sky)"/>
  <g filter="url(#sk)" stroke-linecap="round" stroke-linejoin="round">

    <!-- 해 + 은은한 빛무리 -->
    <circle cx="1208" cy="120" r="78" fill="#fff2c8" opacity="0.5" filter="url(#soft)"/>
    <circle cx="1208" cy="120" r="50" fill="url(#sun)" stroke="#f2c25a" stroke-width="2"/>

    <!-- 구름 · 새 -->
    <use href="#cloud" transform="translate(110,104) scale(1.35)"/>
    <use href="#cloud" transform="translate(430,60) scale(0.98)"/>
    <use href="#cloud" transform="translate(940,150) scale(0.72)" opacity="0.95"/>
    <path d="M320,180 q12,-12 24,0 q12,-12 24,0" fill="none" stroke="#40514a" stroke-width="2.2"/>
    <path d="M400,152 q9,-9 18,0 q9,-9 18,0" fill="none" stroke="#40514a" stroke-width="2.2"/>
    <path d="M360,205 q7,-7 14,0 q7,-7 14,0" fill="none" stroke="#40514a" stroke-width="2" opacity="0.75"/>

    <!-- 한라산 본체 (시작페이지 산 이식) -->
    <path d="M-20,432 C180,400 360,390 470,382 C560,376 632,366 700,336 C752,314 794,294 828,282 C838,280 846,284 850,288 C856,284 866,280 872,282 C918,292 1000,322 1084,350 C1200,388 1320,402 1400,408 C1430,410 1460,418 1460,432 L1460,760 L-20,760 Z" fill="url(#mtn)"/>
    <!-- 좌측(음지) 음영 -->
    <path d="M-20,432 C180,400 360,390 470,382 C560,376 632,366 700,336 C752,314 794,294 828,282 C838,280 846,284 850,288 L850,760 L-20,760 Z" fill="url(#mtnShade)"/>
    <!-- 정상부 밝은 바위 자락 -->
    <path d="M810,290 C826,279 866,279 880,292 C864,301 826,301 810,290 Z" fill="#f0f5ea" opacity="0.6"/>
    <!-- 능선 윤곽선 -->
    <path d="M-20,432 C180,400 360,390 470,382 C560,376 632,366 700,336 C752,314 794,294 828,282 C838,280 846,284 850,288 C856,284 866,280 872,282 C918,292 1000,322 1084,350 C1200,388 1320,402 1400,408 C1430,410 1460,418 1460,432" fill="none" stroke="#40514a" stroke-width="2.4"/>

    <!-- 백록담 분화구 살짝 팬 자국 -->
    <path d="M826,286 C840,293 860,293 874,286" fill="none" stroke="#7f9a6a" stroke-width="1.6" opacity="0.5"/>

    <!-- 정상에서 뻗어내리는 골(계곡) 능선 -->
    <path d="M834,300 C812,344 766,386 716,420" fill="none" stroke="#7f9a6a" stroke-width="1.6"/>
    <path d="M848,300 C864,346 904,390 948,424" fill="none" stroke="#7f9a6a" stroke-width="1.6" opacity="0.42"/>
    <path d="M824,306 C770,340 698,370 638,406" fill="none" stroke="#7f9a6a" stroke-width="1.6" opacity="0.34"/>
    <path d="M860,304 C930,336 1018,370 1094,406" fill="none" stroke="#7f9a6a" stroke-width="1.6" opacity="0.3"/>

    <!-- 옅은 등고선 -->
    <path d="M472,392 C622,360 802,356 968,392" fill="none" stroke="#7f9a6a" stroke-width="1.6" opacity="0.4"/>
    <path d="M562,420 C722,396 902,398 1062,424" fill="none" stroke="#7f9a6a" stroke-width="1.6" opacity="0.26"/>

    <!-- 오름 두 개 -->
    <path d="M110,600 C165,544 250,544 305,600 Z" fill="#bcd6a4" stroke="#40514a" stroke-width="2" opacity="0.95"/>
    <path d="M205,560 C200,578 188,592 172,600" fill="none" stroke="#7f9a6a" stroke-width="1.6" opacity="0.5"/>
    <path d="M150,600 C170,566 240,566 262,598" fill="none" stroke="#8fae6f" stroke-width="1.4" opacity="0.4"/>
    <path d="M1148,608 C1200,556 1276,556 1322,608 Z" fill="#bcd6a4" stroke="#40514a" stroke-width="2" opacity="0.95"/>
    <path d="M1236,570 C1232,586 1222,598 1208,606" fill="none" stroke="#7f9a6a" stroke-width="1.6" opacity="0.45"/>

    <!-- 숲 띠 (그라데이션) -->
    <path d="M-20,620 C240,592 480,606 720,596 C960,586 1220,604 1460,592 L1460,760 L-20,760 Z" fill="url(#forestGrad)"/>
    <path d="M-20,620 C240,592 480,606 720,596 C960,586 1220,604 1460,592" fill="none" stroke="#40514a" stroke-width="2.2"/>
    <!-- 뒷줄 나무(작게, 흐리게) -->
    <use href="#fir" transform="translate(150,636) scale(0.7)" opacity="0.8"/>
    <use href="#tree" transform="translate(400,634) scale(0.7)" opacity="0.8"/>
    <use href="#fir" transform="translate(680,636) scale(0.7)" opacity="0.8"/>
    <use href="#tree" transform="translate(980,634) scale(0.7)" opacity="0.8"/>
    <use href="#fir" transform="translate(1260,636) scale(0.7)" opacity="0.8"/>
    <!-- 앞줄 나무 -->
    <use href="#fir" transform="translate(90,656)"/><use href="#tree" transform="translate(205,648) scale(0.9)"/>
    <use href="#fir" transform="translate(330,660) scale(1.05)"/><use href="#tree" transform="translate(470,650) scale(1.1)"/>
    <use href="#fir" transform="translate(610,658) scale(0.92)"/><use href="#tree" transform="translate(760,652)"/>
    <use href="#fir" transform="translate(900,660) scale(0.88)"/><use href="#tree" transform="translate(1040,648) scale(1.1)"/>
    <use href="#fir" transform="translate(1190,658)"/><use href="#tree" transform="translate(1330,650) scale(0.92)"/>

    <!-- 앞들판 + 철쭉 -->
    <path d="M-20,690 C300,668 700,684 1060,672 C1240,666 1380,674 1460,678 L1460,760 L-20,760 Z" fill="url(#fieldGrad)"/>
    <path d="M-20,690 C300,668 700,684 1060,672 C1240,666 1380,674 1460,678" fill="none" stroke="#9cb884" stroke-width="2"/>
    <!-- 풀결 -->
    <path d="M120,732 q3,-12 0,-20 M260,738 q3,-12 0,-20 M600,742 q3,-12 0,-20 M760,740 q-3,-10 2,-18 M960,742 q3,-12 0,-20 M1300,738 q3,-12 0,-20" fill="none" stroke="#a7c886" stroke-width="2" opacity="0.7"/>
    <!-- 철쭉 덤불 -->
    <g>
      <circle cx="180" cy="716" r="8" fill="#f2a0c0"/><circle cx="197" cy="724" r="7" fill="#ee8db3"/><circle cx="166" cy="726" r="7" fill="#f4b0cc"/><circle cx="184" cy="730" r="6" fill="#ee8db3"/>
      <circle cx="518" cy="732" r="8" fill="#f2a0c0"/><circle cx="536" cy="724" r="7" fill="#ee8db3"/><circle cx="504" cy="726" r="6" fill="#f4b0cc"/>
      <circle cx="858" cy="714" r="8" fill="#f2a0c0"/><circle cx="876" cy="722" r="7" fill="#ee8db3"/><circle cx="846" cy="724" r="7" fill="#f4b0cc"/><circle cx="864" cy="728" r="6" fill="#ee8db3"/>
      <circle cx="1198" cy="728" r="8" fill="#f2a0c0"/><circle cx="1216" cy="720" r="7" fill="#ee8db3"/><circle cx="1184" cy="722" r="6" fill="#f4b0cc"/>
    </g>

    <!-- 노루 (음영·표정 보강) -->
    <g transform="translate(1078,662)">
      <ellipse cx="2" cy="4" rx="30" ry="9" fill="#7d5c36" opacity="0.18"/>
      <ellipse cx="0" cy="0" rx="30" ry="18" fill="#d9b48a" stroke="#8a6b4a" stroke-width="2.4"/>
      <path d="M-30,0 C-26,-8 -10,-10 0,-8" fill="#e6c79f" opacity="0.7"/>
      <line x1="-20" y1="14" x2="-22" y2="42" stroke="#8a6b4a" stroke-width="4"/>
      <line x1="-8" y1="16" x2="-8" y2="42" stroke="#8a6b4a" stroke-width="4"/>
      <line x1="10" y1="16" x2="10" y2="42" stroke="#8a6b4a" stroke-width="4"/>
      <line x1="22" y1="14" x2="26" y2="42" stroke="#8a6b4a" stroke-width="4"/>
      <ellipse cx="36" cy="-18" rx="9" ry="11" fill="#d9b48a" stroke="#8a6b4a" stroke-width="2.4"/>
      <path d="M30,-28 L26,-42 M40,-28 L44,-44 M44,-44 L50,-50 M44,-44 L38,-49" fill="none" stroke="#8a6b4a" stroke-width="2.4"/>
      <circle cx="40" cy="-20" r="2" fill="#40514a"/>
      <path d="M30,-8 q-3,4 0,8" fill="none" stroke="#8a6b4a" stroke-width="1.6"/>
      <path d="M-28,-4 q-9,1 -10,10" fill="none" stroke="#8a6b4a" stroke-width="3"/>
      <circle cx="-30" cy="6" r="3" fill="#f6fbf2" opacity="0.9"/>
    </g>
  </g>
</svg>
