<!-- 중문 — 주상절리대 (고퀄 리터치) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" preserveAspectRatio="xMidYMax slice">
  <defs>
    <filter id="sk"><feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="5"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c3e2f2"/><stop offset="0.6" stop-color="#dcecf6"/><stop offset="1" stop-color="#eef6f4"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ecfe0"/><stop offset="0.5" stop-color="#6bbdd6"/><stop offset="1" stop-color="#4fa6c4"/>
    </linearGradient>
    <!-- 현무암 기둥: 정면광(밝음)·측면(어두움) 두 계열을 그라데이션으로 -->
    <linearGradient id="colA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#807d8a"/><stop offset="0.5" stop-color="#6f6c77"/><stop offset="1" stop-color="#565360"/>
    </linearGradient>
    <linearGradient id="colB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6f6c77"/><stop offset="0.5" stop-color="#5e5b67"/><stop offset="1" stop-color="#48454f"/>
    </linearGradient>
    <linearGradient id="colC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b8794"/><stop offset="0.5" stop-color="#787582"/><stop offset="1" stop-color="#615e6a"/>
    </linearGradient>
    <linearGradient id="cliffTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b6d49a"/><stop offset="1" stop-color="#93b877"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3cf"/><stop offset="0.7" stop-color="#ffe08c"/><stop offset="1" stop-color="#ffd36a"/>
    </radialGradient>
    <g id="cloud">
      <path d="M10,36 C1,36 -5,27 2,21 C-1,10 12,4 20,11 C25,-1 44,-2 50,9 C61,3 75,10 71,22 C82,23 82,36 71,36 Z" fill="#ffffff"/>
      <path d="M10,36 C1,36 -5,27 2,21 C-1,10 12,4 20,11 C25,-1 44,-2 50,9 C61,3 75,10 71,22 C82,23 82,36 71,36 Z" fill="none" stroke="#40514a" stroke-width="2"/>
      <path d="M14,31 C24,35 40,35 52,31" fill="none" stroke="#bcd6ea" stroke-width="1.6" opacity="0.7"/>
    </g>
  </defs>

  <rect width="1440" height="760" fill="url(#sky)"/>
  <g filter="url(#sk)" stroke-linecap="round" stroke-linejoin="round">

    <!-- 해 · 구름 · 새 -->
    <circle cx="222" cy="132" r="76" fill="#fff2c8" opacity="0.5" filter="url(#soft)"/>
    <circle cx="222" cy="132" r="50" fill="url(#sun)" stroke="#f2c25a" stroke-width="2"/>
    <use href="#cloud" transform="translate(520,78) scale(1.25)"/>
    <use href="#cloud" transform="translate(900,58) scale(0.92)"/>
    <use href="#cloud" transform="translate(1180,142) scale(0.7)" opacity="0.95"/>
    <path d="M640,172 q12,-12 24,0 q12,-12 24,0" fill="none" stroke="#40514a" stroke-width="2.2"/>
    <path d="M720,142 q9,-9 18,0 q9,-9 18,0" fill="none" stroke="#40514a" stroke-width="2.2"/>

    <!-- 바다 (그라데이션 + 원경 수평 파랑) -->
    <rect x="-20" y="330" width="1480" height="430" fill="url(#sea)"/>
    <line x1="-20" y1="330" x2="1460" y2="330" stroke="#5fa8c0" stroke-width="2.5"/>
    <!-- 원경 반짝임 -->
    <path d="M80,398 q20,-7 40,0 M300,428 q20,-7 40,0 M120,516 q22,-8 44,0 M360,576 q22,-8 44,0 M180,656 q24,-9 48,0 M470,700 q24,-9 48,0 M60,720 q24,-9 48,0" fill="none" stroke="#ffffff" stroke-width="2.6" opacity="0.85"/>
    <path d="M100,360 q16,-6 32,0 M260,368 q16,-6 32,0 M420,360 q16,-6 32,0" fill="none" stroke="#c8ecf4" stroke-width="2" opacity="0.7"/>

    <!-- 왼쪽 낮은 주상절리 묶음 -->
    <g stroke="#26242b" stroke-width="2.2">
      <rect x="520" y="470" width="42" height="290" fill="url(#colA)"/>
      <rect x="562" y="440" width="46" height="320" fill="url(#colB)"/>
      <rect x="608" y="470" width="40" height="290" fill="url(#colC)"/>
      <rect x="648" y="500" width="42" height="260" fill="url(#colB)"/>
    </g>
    <path d="M520,470 l21,-9 21,9 M562,440 l23,-9 23,9 M608,470 l20,-9 20,9 M648,500 l21,-9 21,9" fill="#8b8794" stroke="#26242b" stroke-width="1.8"/>
    <path d="M520,530 L648,530 M562,600 L690,600 M520,670 L648,670" stroke="#3a3742" stroke-width="1.8" opacity="0.8"/>

    <!-- 메인 주상절리 절벽 상단 (풀 언덕) -->
    <path d="M760,300 C900,282 1100,286 1460,272 L1460,340 L760,352 Z" fill="url(#cliffTop)" stroke="#40514a" stroke-width="2.4"/>
    <path d="M790,296 q4,-16 0,-26 M800,296 q-4,-14 2,-24 M1000,286 q4,-16 0,-26 M1010,286 q-4,-14 2,-24 M1200,282 q4,-16 0,-26 M1400,276 q4,-16 0,-26 M1410,276 q-4,-14 2,-24" fill="none" stroke="#5f8f3f" stroke-width="2.4"/>

    <!-- 메인 절벽 기둥 (그라데이션 교차) -->
    <g stroke="#26242b" stroke-width="2.4">
      <rect x="760" y="348" width="52" height="412" fill="url(#colB)"/>
      <rect x="812" y="332" width="56" height="428" fill="url(#colA)"/>
      <rect x="868" y="356" width="50" height="404" fill="url(#colC)"/>
      <rect x="918" y="326" width="56" height="434" fill="url(#colB)"/>
      <rect x="974" y="348" width="52" height="412" fill="url(#colA)"/>
      <rect x="1026" y="318" width="58" height="442" fill="url(#colB)"/>
      <rect x="1084" y="342" width="52" height="418" fill="url(#colC)"/>
      <rect x="1136" y="312" width="58" height="448" fill="url(#colB)"/>
      <rect x="1194" y="336" width="54" height="424" fill="url(#colA)"/>
      <rect x="1248" y="308" width="58" height="452" fill="url(#colB)"/>
      <rect x="1306" y="330" width="54" height="430" fill="url(#colC)"/>
      <rect x="1360" y="304" width="100" height="456" fill="url(#colB)"/>
    </g>
    <!-- 각 기둥 왼쪽 하이라이트 모서리 -->
    <g stroke="#a5a1ad" stroke-width="1.4" opacity="0.7">
      <line x1="814" y1="336" x2="814" y2="756"/><line x1="920" y1="330" x2="920" y2="756"/>
      <line x1="1028" y1="322" x2="1028" y2="756"/><line x1="1138" y1="316" x2="1138" y2="756"/>
      <line x1="1250" y1="312" x2="1250" y2="756"/><line x1="1362" y1="308" x2="1362" y2="756"/>
    </g>
    <!-- 육각 단면 캡 -->
    <path d="M760,348 l26,-9 26,9 M812,332 l28,-10 28,10 M868,356 l25,-9 25,9 M918,326 l28,-10 28,10 M974,348 l26,-9 26,9 M1026,318 l29,-10 29,10 M1084,342 l26,-9 26,9 M1136,312 l29,-10 29,10 M1194,336 l27,-9 27,9 M1248,308 l29,-10 29,10 M1306,330 l27,-9 27,9" fill="#8b8794" stroke="#26242b" stroke-width="2"/>
    <!-- 가로 균열 -->
    <path d="M760,430 L1460,414 M812,520 L1460,506 M760,610 L1460,598 M812,690 L1460,680" stroke="#2c2a31" stroke-width="1.8" opacity="0.7"/>
    <!-- 현무암 기공 -->
    <circle cx="840" cy="470" r="3.4" fill="#1c1b20" opacity="0.6"/><circle cx="948" cy="560" r="3" fill="#1c1b20" opacity="0.6"/>
    <circle cx="1056" cy="450" r="3.4" fill="#1c1b20" opacity="0.6"/><circle cx="1170" cy="640" r="3" fill="#1c1b20" opacity="0.6"/>
    <circle cx="1290" cy="480" r="3.4" fill="#1c1b20" opacity="0.6"/><circle cx="1396" cy="580" r="3" fill="#1c1b20" opacity="0.6"/>
    <circle cx="900" cy="640" r="2.6" fill="#1c1b20" opacity="0.5"/><circle cx="1120" cy="500" r="2.6" fill="#1c1b20" opacity="0.5"/>

    <!-- 절벽 밑 바다 그림자 -->
    <path d="M500,740 C640,724 760,730 900,738 L900,760 L500,760 Z" fill="#3f93b0" opacity="0.5"/>

    <!-- 부서지는 파도 (기둥 아랫동에 흰 포말 겹) -->
    <g fill="#ffffff" stroke="#d8f0f6" stroke-width="1.6">
      <circle cx="742" cy="744" r="16"/><circle cx="716" cy="752" r="11"/><circle cx="766" cy="738" r="11"/>
      <circle cx="698" cy="744" r="8"/><circle cx="784" cy="750" r="8"/><circle cx="748" cy="726" r="9"/>
      <circle cx="510" cy="746" r="14"/><circle cx="488" cy="754" r="9"/><circle cx="534" cy="740" r="9"/><circle cx="470" cy="752" r="6"/>
      <circle cx="1170" cy="750" r="12"/><circle cx="1148" cy="756" r="8"/><circle cx="1192" cy="746" r="8"/>
    </g>
    <path d="M640,742 q22,-10 44,0 q22,10 44,0 M560,752 q20,-9 40,0 M1050,752 q22,-9 44,0" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.95"/>
    <!-- 물보라 -->
    <circle cx="750" cy="700" r="4" fill="#ffffff"/><circle cx="766" cy="680" r="3.4" fill="#ffffff"/>
    <circle cx="736" cy="666" r="3" fill="#ffffff"/><circle cx="758" cy="648" r="2.6" fill="#ffffff"/>
    <circle cx="524" cy="710" r="3.6" fill="#ffffff"/><circle cx="540" cy="692" r="3" fill="#ffffff"/>
    <circle cx="1176" cy="712" r="3.4" fill="#ffffff"/><circle cx="1160" cy="694" r="2.8" fill="#ffffff"/>

    <!-- 갈매기 -->
    <path d="M980,430 q9,-9 18,0 q9,-9 18,0" fill="none" stroke="#3a3742" stroke-width="2.4"/>
    <path d="M1050,470 q7,-7 14,0 q7,-7 14,0" fill="none" stroke="#3a3742" stroke-width="2" opacity="0.85"/>
  </g>
</svg>
