    <path d="M120,368 C160,360 220,358 260,362" fill="none" stroke="#a08f6e" stroke-width="1.8" opacity="0.7"/>

    <!-- 바다 -->
    <rect x="-20" y="382" width="1480" height="200" fill="#8fb8d8"/>
    <line x1="-20" y1="382" x2="1460" y2="382" stroke="#7aa2c4" stroke-width="2.5"/>
