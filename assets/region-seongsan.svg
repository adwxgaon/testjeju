<!-- 성산·우도 — 성산일출봉과 일출 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 760" preserveAspectRatio="xMidYMax slice">
  <defs>
    <filter id="sk"><feTurbulence type="fractalNoise" baseFrequency="0.016" numOctaves="2" seed="7" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="5"/></filter>
    <linearGradient id="dawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe3b8"/><stop offset="0.65" stop-color="#ffd9a8"/><stop offset="1" stop-color="#ffcf9a"/>
    </linearGradient>
    <g id="canola">
      <path d="M0,17 C-1.6,9 1.2,4 0,-1" fill="none" stroke="#6f9a3a" stroke-width="2"/>
      <circle cx="0" cy="-5" r="3.2" fill="#f5cf3a"/><circle cx="5" cy="0" r="3.2" fill="#f5cf3a"/>
      <circle cx="-5" cy="0" r="3.2" fill="#f5cf3a"/><circle cx="0" cy="5" r="3.2" fill="#f5cf3a"/>
      <circle r="2.4" fill="#d98a12"/>
    </g>
  </defs>

  <rect width="1440" height="760" fill="url(#dawn)"/>
  <g filter="url(#sk)" stroke-linecap="round" stroke-linejoin="round">

    <!-- 떠오르는 해 + 햇살 -->
    <circle cx="1020" cy="270" r="86" fill="#ffb15c" stroke="#e07c2a" stroke-width="2.6"/>
    <circle cx="1020" cy="270" r="110" fill="none" stroke="#ffcf8a" stroke-width="3" opacity="0.7"/>
    <path d="M1020,120 L1020,86 M902,152 L878,128 M1138,152 L1162,128 M860,270 L820,270" fill="none" stroke="#ffb15c" stroke-width="5" opacity="0.8"/>

    <!-- 새 -->
