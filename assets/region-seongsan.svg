      <path d="M-16,62 L16,62 L10,0 L-10,0 Z" fill="#ffffff" stroke="#40514a" stroke-width="2.4"/>
      <path d="M-13,40 L13,40 M-11,20 L11,20" stroke="#ff5f4e" stroke-width="8"/>
      <rect x="-8" y="-16" width="16" height="16" fill="#ffdf8a" stroke="#40514a" stroke-width="2.2"/>
      <path d="M-12,-16 L12,-16 L0,-28 Z" fill="#ff5f4e" stroke="#40514a" stroke-width="2.2"/>
