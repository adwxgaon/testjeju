    <path d="M410,140 q9,-9 18,0 q9,-9 18,0" fill="none" stroke="#8a6b4a" stroke-width="2.4"/>
    <path d="M520,200 q8,-8 16,0 q8,-8 16,0" fill="none" stroke="#8a6b4a" stroke-width="2.2" opacity="0.8"/>

