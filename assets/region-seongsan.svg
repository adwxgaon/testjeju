    <path d="M-20,582 C300,570 700,576 1080,570 C1240,568 1380,574 1460,576 L1460,760 L-20,760 Z" fill="#e8d9a8"/>
    <path d="M-20,582 C300,570 700,576 1080,570 C1240,568 1380,574 1460,576" fill="none" stroke="#c9b678" stroke-width="2.2"/>

