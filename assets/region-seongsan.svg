    <path d="M960,410 L1080,410 M985,438 L1100,438 M950,466 L1060,466 M1000,494 L1120,494 M970,522 L1080,522 M1010,550 L1110,550" stroke="#ffcf8a" stroke-width="5" opacity="0.85"/>
    <path d="M120,430 q20,-8 40,0 M360,410 q20,-8 40,0 M560,450 q20,-8 40,0 M240,500 q22,-8 44,0 M480,540 q22,-8 44,0 M680,510 q20,-8 40,0" fill="none" stroke="#ffffff" stroke-width="2.4" opacity="0.75"/>

    <!-- 성산일출봉 -->
    <path d="M780,582 C800,520 830,440 872,368 C906,310 952,264 990,252 C1010,246 1060,242 1090,246 C1130,252 1180,272 1216,304 C1268,350 1320,440 1352,510 C1372,552 1386,572 1394,582 Z" fill="#8aa878" stroke="#40514a" stroke-width="2.6"/>
