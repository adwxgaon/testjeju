    <path d="M-20,640 C280,622 640,632 980,624 C1180,620 1340,628 1460,628 L1460,760 L-20,760 Z" fill="#f8de6a"/>
    <path d="M-20,640 C280,622 640,632 980,624 C1180,620 1340,628 1460,628" fill="none" stroke="#d9b93c" stroke-width="2.2"/>
