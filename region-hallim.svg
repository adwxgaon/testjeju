      <path d="M-74,50 Q0,0 74,50" fill="none" stroke="#ffffff" stroke-width="8"/>
      <path d="M-36,22 Q0,4 36,22" fill="none" stroke="#ffffff" stroke-width="7"/>
      <line x1="0" y1="8" x2="0" y2="212" stroke="#40514a" stroke-width="4.5"/>
      <g transform="translate(48,168)">
        <rect x="0" y="0" width="190" height="88" rx="8" fill="#fff6e6" stroke="#40514a" stroke-width="2.4" transform="skewX(-12)"/>
        <line x1="30" y1="0" x2="12" y2="88" stroke="#7ecfe0" stroke-width="7"/>
        <line x1="70" y1="0" x2="52" y2="88" stroke="#7ecfe0" stroke-width="7"/>
        <line x1="110" y1="0" x2="92" y2="88" stroke="#7ecfe0" stroke-width="7"/>
        <line x1="150" y1="0" x2="132" y2="88" stroke="#7ecfe0" stroke-width="7"/>
      </g>
      <!-- 모래성 양동이 -->
      <g transform="translate(-150,210)">
        <path d="M-20,0 L20,0 L14,34 L-14,34 Z" fill="#f5cf3a" stroke="#40514a" stroke-width="2.2"/>
        <path d="M-20,0 Q0,-18 20,0" fill="none" stroke="#40514a" stroke-width="2.4"/>
      </g>
    </g>
  </g>
</svg>
