    <!-- 파도 거품이 닿는 모래 경계 -->
    <path d="M-20,542 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 L1460,760 L-20,760 Z" fill="#faeecd"/>
    <path d="M-20,542 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0 q30,14 60,0" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.95"/>

    <!-- 모래 알갱이 -->
    <circle cx="160" cy="620" r="3" fill="#e3cd9c"/><circle cx="340" cy="668" r="2.4" fill="#e3cd9c"/>
    <circle cx="540" cy="612" r="3" fill="#e3cd9c"/><circle cx="760" cy="700" r="2.6" fill="#e3cd9c"/>
    <circle cx="960" cy="640" r="3" fill="#e3cd9c"/><circle cx="1180" cy="690" r="2.4" fill="#e3cd9c"/>
    <circle cx="1340" cy="620" r="3" fill="#e3cd9c"/><circle cx="80" cy="706" r="2.6" fill="#e3cd9c"/>

    <!-- 발자국 -->
    <g fill="#e0c896">
      <ellipse cx="600" cy="600" rx="7" ry="11" transform="rotate(14 600 600)"/>
      <ellipse cx="628" cy="632" rx="7" ry="11" transform="rotate(10 628 632)"/>
      <ellipse cx="650" cy="666" rx="7" ry="11" transform="rotate(14 650 666)"/>
      <ellipse cx="678" cy="698" rx="7" ry="11" transform="rotate(10 678 698)"/>
    </g>

    <!-- 불가사리 · 조개 -->
    <path d="M1050,660 l7,16 17,2 -12,12 3,17 -15,-8 -15,8 3,-17 -12,-12 17,-2 Z" fill="#ff9a3d" stroke="#40514a" stroke-width="2"/>
    <path d="M420,700 a14,14 0 0 1 28,0 Z" fill="#ffe4de" stroke="#40514a" stroke-width="2"/>
    <path d="M434,700 L434,688 M427,700 L424,690 M441,700 L444,690" stroke="#40514a" stroke-width="1.6"/>

